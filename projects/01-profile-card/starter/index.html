<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card Starter</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page-shell">
    <article class="profile-card" aria-labelledby="profile-name">
      <header class="profile-header">
        <img
          class="profile-avatar"
          src="assets/avatar.svg"
          alt="Illustrated portrait of Jordan Lee"
          width="160"
          height="160"
        >

        <div>
          <p class="profile-label">Frontend learner</p>
          <h1 id="profile-name">Jordan Lee</h1>
          <!-- TODO: Add a short professional role below the name. -->
        </div>
      </header>

      <!-- TODO: Add a short biography paragraph. -->

      <section class="profile-details" aria-labelledby="details-heading">
        <h2 id="details-heading">Profile Details</h2>
        <!-- TODO: Add the location and a short list of frontend skills. -->
      </section>

      <nav class="profile-links" aria-label="Profile links">
        <!-- TODO: Add portfolio, GitHub, email, and one primary call-to-action link. -->
      </nav>
    </article>
  </main>
</body>
</html>
